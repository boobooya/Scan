<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Options Scanner - Fresh Build</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #2d3436;
            margin-bottom: 10px;
        }

        .scan-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .scan-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 13px;
            margin-bottom: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .status div {
            margin: 3px 0;
        }

        .success { color: #00b894; }
        .error { color: #d63031; }
        .warning { color: #fdcb6e; }
        .info { color: #0984e3; }

        .results-grid {
            display: grid;
            gap: 15px;
        }

        .result-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .result-card.bullish { border-left-color: #00b894; }
        .result-card.bearish { border-left-color: #d63031; }

        .symbol {
            font-size: 24px;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 10px;
        }

        .details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            font-size: 13px;
        }

        .detail-item {
            background: white;
            padding: 10px;
            border-radius: 5px;
        }

        .label {
            color: #636e72;
            font-size: 11px;
            margin-bottom: 3px;
        }

        .value {
            color: #2d3436;
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }

        .badge.bullish {
            background: #d4edda;
            color: #155724;
        }

        .badge.bearish {
            background: #f8d7da;
            color: #721c24;
        }

        .badge.neutral {
            background: #fff3cd;
            color: #856404;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            max-width: 900px;
            margin: 0 auto;
            border-radius: 15px;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }

        .close-btn {
            background: #d63031;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .signal-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .signal-box h3 {
            margin-bottom: 15px;
            color: #2d3436;
        }

        .recommendation {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .rec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .rec-item {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 8px;
        }

        canvas {
            max-height: 300px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📊 Weekly Options Scanner</h1>
            <p style="color: #636e72; margin-bottom: 20px;">Scanning stocks with Monday/Wednesday/Friday expirations (0-7 days)</p>
            
            <button class="scan-btn" id="scanBtn" onclick="startScan()">
                🔍 Start Scanning
            </button>

            <div class="status" id="status">
                <div class="info">Click "Start Scanning" to begin...</div>
            </div>
        </div>

        <div class="card" id="resultsCard" style="display: none;">
            <h2 style="margin-bottom: 20px;">Results: <span id="count">0</span> Opportunities</h2>
            <div class="results-grid" id="results"></div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Analysis</h2>
                <button class="close-btn" onclick="closeModal()">✕ Close</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        // Core symbols with confirmed weekly options
        const SYMBOLS = [
            'SPY', 'QQQ', 'IWM', 'DIA',
            'AAPL', 'MSFT', 'TSLA', 'NVDA', 'AMD', 'META', 'AMZN', 'GOOGL',
            'JPM', 'BAC', 'GS', 'MS',
            'XLE', 'XLF', 'XLK', 'XLV',
            'GLD', 'SLV', 'TLT', 'USO',
            'COIN', 'MARA', 'RIOT'
        ];

        let results = [];
        let currentChart = null;

        function log(message, type = 'info') {
            const status = document.getElementById('status');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = message;
            status.appendChild(div);
            status.scrollTop = status.scrollHeight;
        }

        async function fetchData(url) {
            const proxies = [
                'https://api.allorigins.win/raw?url=',
                'https://corsproxy.io/?'
            ];

            for (let proxy of proxies) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(url), {
                        signal: AbortSignal.timeout(5000)
                    });
                    
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (e) {
                    continue;
                }
            }
            throw new Error('All proxies failed');
        }

        async function startScan() {
            const btn = document.getElementById('scanBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = '🔄 Scanning...';
            status.innerHTML = '';
            results = [];

            log('🚀 Starting scan...', 'info');
            log(`📊 Scanning ${SYMBOLS.length} symbols`, 'info');

            let scanned = 0;
            let found = 0;
            let notWeekly = 0;
            let errors = 0;

            const promises = SYMBOLS.map(async (symbol) => {
                try {
                    const data = await analyzeSymbol(symbol);
                    scanned++;
                    
                    if (data) {
                        results.push(data);
                        found++;
                        log(`✓ ${symbol}: ${data.signal} (${data.dte} DTE, Strike: $${data.strike})`, 'success');
                    } else {
                        notWeekly++;
                    }
                    
                    if (scanned % 5 === 0) {
                        updateResults();
                    }
                } catch (e) {
                    errors++;
                    log(`✗ ${symbol}: ${e.message}`, 'error');
                    scanned++;
                }
            });

            await Promise.all(promises);

            log(`\n✅ Scan complete!`, 'success');
            log(`📊 Scanned: ${scanned}`, 'info');
            log(`✓ Found: ${found}`, 'success');
            log(`⚠ Not weekly: ${notWeekly}`, 'warning');
            log(`✗ Errors: ${errors}`, 'error');

            updateResults();
            btn.disabled = false;
            btn.textContent = '🔍 Start Scanning';
        }

        async function analyzeSymbol(symbol) {
            // Fetch options data
            const optUrl = `https://query2.finance.yahoo.com/v7/finance/options/${symbol}`;
            const optData = await fetchData(optUrl);

            if (!optData?.optionChain?.result?.[0]) {
                return null;
            }

            const chain = optData.optionChain.result[0];
            const price = chain.quote?.regularMarketPrice;
            const expirations = chain.expirationDates || [];

            if (!price || expirations.length === 0) {
                return null;
            }

            // Check if weekly (0-7 days)
            const nextExp = expirations[0];
            const expDate = new Date(nextExp * 1000);
            const dte = Math.round((expDate - new Date()) / (1000 * 60 * 60 * 24));

            if (dte > 7 || dte < 0) {
                return null; // Not a weekly
            }

            // Fetch price history
            const histUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=60d`;
            const histData = await fetchData(histUrl);

            if (!histData?.chart?.result?.[0]) {
                return null;
            }

            const quotes = histData.chart.result[0].indicators.quote[0];
            const closes = quotes.close.filter(p => p != null);
            const highs = quotes.high.filter(p => p != null);
            const lows = quotes.low.filter(p => p != null);

            if (closes.length < 20) {
                return null;
            }

            // Calculate indicators
            const sma20 = closes.slice(-20).reduce((a, b) => a + b) / 20;
            const sma50 = closes.length >= 50 ? closes.slice(-50).reduce((a, b) => a + b) / 50 : sma20;

            // Determine signal
            let signal = 'neutral';
            if (price > sma20 && sma20 > sma50) signal = 'bullish';
            if (price < sma20 && sma20 < sma50) signal = 'bearish';

            // Find support/resistance
            const resistance = Math.max(...highs.slice(-20));
            const support = Math.min(...lows.slice(-20));

            // Calculate strike
            const atm = Math.round(price / 5) * 5;
            const strike = signal === 'bullish' ? atm + 5 : signal === 'bearish' ? atm - 5 : atm;

            return {
                symbol,
                price: price.toFixed(2),
                signal,
                dte,
                expDate: expDate.toLocaleDateString(),
                strike,
                atm,
                sma20: sma20.toFixed(2),
                sma50: sma50.toFixed(2),
                resistance: resistance.toFixed(2),
                support: support.toFixed(2),
                history: {
                    closes,
                    highs,
                    lows,
                    timestamps: histData.chart.result[0].timestamp
                }
            };
        }

        function updateResults() {
            const resultsCard = document.getElementById('resultsCard');
            const resultsDiv = document.getElementById('results');
            const countSpan = document.getElementById('count');

            if (results.length === 0) {
                resultsCard.style.display = 'none';
                return;
            }

            resultsCard.style.display = 'block';
            countSpan.textContent = results.length;

            // Sort by signal strength
            const sorted = [...results].sort((a, b) => {
                const order = { bullish: 0, bearish: 1, neutral: 2 };
                return order[a.signal] - order[b.signal];
            });

            resultsDiv.innerHTML = sorted.map(r => `
                <div class="result-card ${r.signal}" onclick='showDetail(${JSON.stringify(r)})'>
                    <div class="symbol">${r.symbol}</div>
                    <div class="details">
                        <div class="detail-item">
                            <div class="label">Current Price</div>
                            <div class="value">$${r.price}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">Expiration</div>
                            <div class="value">${r.expDate} (${r.dte}d)</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">Recommended Strike</div>
                            <div class="value">$${r.strike}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">Strategy</div>
                            <div class="value">${r.signal === 'bullish' ? 'Call' : r.signal === 'bearish' ? 'Put' : 'Straddle'}</div>
                        </div>
                    </div>
                    <span class="badge ${r.signal}">
                        ${r.signal === 'bullish' ? '🟢 Bullish' : r.signal === 'bearish' ? '🔴 Bearish' : '🟡 Neutral'}
                    </span>
                </div>
            `).join('');
        }

        function showDetail(data) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            title.textContent = `${data.symbol} - Detailed Analysis`;

            body.innerHTML = `
                <div class="signal-box">
                    <h3>📊 Current Status</h3>
                    <div class="rec-grid">
                        <div class="detail-item">
                            <div class="label">Current Price</div>
                            <div class="value">$${data.price}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">SMA(20)</div>
                            <div class="value">$${data.sma20}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">SMA(50)</div>
                            <div class="value">$${data.sma50}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">Signal</div>
                            <div class="value">${data.signal.toUpperCase()}</div>
                        </div>
                    </div>
                </div>

                <div class="signal-box">
                    <h3>🎯 Key Levels</h3>
                    <div class="rec-grid">
                        <div class="detail-item">
                            <div class="label">🔴 Resistance</div>
                            <div class="value">$${data.resistance}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">🟢 Support</div>
                            <div class="value">$${data.support}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">ATM Strike</div>
                            <div class="value">$${data.atm}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">Days to Exp</div>
                            <div class="value">${data.dte} days</div>
                        </div>
                    </div>
                </div>

                <div class="recommendation">
                    <h3>💡 Trade Recommendation</h3>
                    ${data.signal === 'bullish' ? `
                        <p><strong>BULLISH SETUP - Buy Call Options</strong></p>
                        <div class="rec-grid">
                            <div class="rec-item"><strong>Strike:</strong> $${data.strike}</div>
                            <div class="rec-item"><strong>Expiration:</strong> ${data.expDate}</div>
                            <div class="rec-item"><strong>Entry:</strong> Price above $${data.sma20}</div>
                            <div class="rec-item"><strong>Target:</strong> $${data.resistance}</div>
                        </div>
                        <p style="margin-top: 15px; font-size: 13px;">✅ Price is above SMA(20) and SMA(50), indicating uptrend. Consider buying call options at strike $${data.strike}.</p>
                    ` : data.signal === 'bearish' ? `
                        <p><strong>BEARISH SETUP - Buy Put Options</strong></p>
                        <div class="rec-grid">
                            <div class="rec-item"><strong>Strike:</strong> $${data.strike}</div>
                            <div class="rec-item"><strong>Expiration:</strong> ${data.expDate}</div>
                            <div class="rec-item"><strong>Entry:</strong> Price below $${data.sma20}</div>
                            <div class="rec-item"><strong>Target:</strong> $${data.support}</div>
                        </div>
                        <p style="margin-top: 15px; font-size: 13px;">📉 Price is below SMA(20) and SMA(50), indicating downtrend. Consider buying put options at strike $${data.strike}.</p>
                    ` : `
                        <p><strong>NEUTRAL - Straddle Strategy</strong></p>
                        <div class="rec-grid">
                            <div class="rec-item"><strong>Call Strike:</strong> $${data.atm}</div>
                            <div class="rec-item"><strong>Put Strike:</strong> $${data.atm}</div>
                            <div class="rec-item"><strong>Expiration:</strong> ${data.expDate}</div>
                            <div class="rec-item"><strong>Strategy:</strong> Buy both</div>
                        </div>
                        <p style="margin-top: 15px; font-size: 13px;">⚖️ No clear trend. Consider straddle (buy both call and put) to profit from volatility.</p>
                    `}
                </div>

                <div class="signal-box">
                    <h3>📈 Price Chart (60 Days)</h3>
                    <canvas id="detailChart"></canvas>
                </div>
            `;

            modal.style.display = 'block';

            // Draw chart
            setTimeout(() => drawChart(data), 100);
        }

        function drawChart(data) {
            const ctx = document.getElementById('detailChart');
            if (!ctx) return;

            if (currentChart) currentChart.destroy();

            const labels = data.history.timestamps.slice(-60).map(ts => 
                new Date(ts * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
            );

            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Price',
                        data: data.history.closes.slice(-60),
                        borderColor: '#2d3436',
                        borderWidth: 2,
                        pointRadius: 0
                    }, {
                        label: 'Resistance',
                        data: Array(60).fill(data.resistance),
                        borderColor: '#d63031',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0
                    }, {
                        label: 'Support',
                        data: Array(60).fill(data.support),
                        borderColor: '#00b894',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'top' }
                    },
                    scales: {
                        y: {
                            ticks: {
                                callback: v => '$' + v.toFixed(2)
                            }
                        }
                    }
                }
            });
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            if (currentChart) {
                currentChart.destroy();
                currentChart = null;
            }
        }
    </script>
</body>
</html>
