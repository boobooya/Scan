<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Options Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            color: #2d3436;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #636e72;
            font-size: 14px;
        }

        .scan-controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .scan-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 206, 201, 0.4);
        }

        .scan-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-bar {
            display: none;
            background: #ecf0f1;
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b894, #00cec9);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .results-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }

        .results-title {
            font-size: 20px;
            font-weight: bold;
            color: #2d3436;
        }

        .results-count {
            font-size: 14px;
            color: #636e72;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-tab {
            padding: 10px 20px;
            background: #ecf0f1;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .filter-tab.active {
            background: #667eea;
            color: white;
        }

        .results-list {
            display: grid;
            gap: 15px;
        }

        .result-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 20px;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .result-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .result-symbol {
            font-size: 24px;
            font-weight: bold;
            color: #2d3436;
            text-align: center;
        }

        .result-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 11px;
            color: #636e72;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: #2d3436;
        }

        .signal-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
        }

        .signal-bullish {
            background: #d4edda;
            color: #155724;
        }

        .signal-bearish {
            background: #f8d7da;
            color: #721c24;
        }

        .signal-neutral {
            background: #fff3cd;
            color: #856404;
        }

        .analysis-button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #636e72;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        /* Modal for detailed analysis */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
        }

        .modal-close {
            background: #d63031;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .analysis-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .signal-zones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .signal-zone {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid;
        }

        .signal-zone.bullish {
            border-color: #00b894;
        }

        .signal-zone.bearish {
            border-color: #d63031;
        }

        .zone-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .zone-price {
            font-size: 24px;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 10px;
        }

        .zone-description {
            font-size: 13px;
            color: #636e72;
            line-height: 1.6;
        }

        .recommendations {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 12px;
            color: white;
        }

        .recommendation-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .recommendation-item:last-child {
            margin-bottom: 0;
        }

        .rec-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .rec-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #ecf0f1;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Weekly Options Scanner</h1>
            <p>Scanning 250+ stocks with Monday, Wednesday, and Friday expirations</p>
        </div>

        <div class="scan-controls">
            <button class="scan-button" id="scanButton" onclick="startScan()">
                🔍 Scan All Weekly Options
            </button>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
        </div>

        <div class="results-container" id="resultsContainer" style="display: none;">
            <div class="results-header">
                <div class="results-title">Scan Results</div>
                <div class="results-count" id="resultsCount">0 opportunities found</div>
            </div>

            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterResults('all')">All</button>
                <button class="filter-tab" onclick="filterResults('bullish')">🟢 Bullish</button>
                <button class="filter-tab" onclick="filterResults('bearish')">🔴 Bearish</button>
                <button class="filter-tab" onclick="filterResults('neutral')">🟡 Neutral</button>
            </div>

            <div class="results-list" id="resultsList"></div>
        </div>
    </div>

    <!-- Analysis Modal -->
    <div class="modal" id="analysisModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Analysis</h2>
                <button class="modal-close" onclick="closeAnalysis()">✕ Close</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        // Comprehensive list of all weekly options symbols (250+)
        const WEEKLY_OPTIONS_SYMBOLS = [
            // Major Index ETFs
            'SPY', 'QQQ', 'IWM', 'DIA', 'EEM', 'EFA', 'VXX', 'UVXY',
            // Mega Cap Tech
            'AAPL', 'MSFT', 'GOOGL', 'GOOG', 'AMZN', 'META', 'NVDA', 'TSLA',
            'NFLX', 'AMD', 'INTC', 'CRM', 'ORCL', 'ADBE', 'CSCO', 'AVGO',
            // Financials
            'JPM', 'BAC', 'WFC', 'C', 'GS', 'MS', 'BLK', 'SCHW', 'AXP',
            // Consumer
            'WMT', 'HD', 'TGT', 'COST', 'NKE', 'SBUX', 'MCD', 'DIS',
            // Healthcare
            'JNJ', 'UNH', 'PFE', 'ABBV', 'TMO', 'ABT', 'MRK', 'LLY',
            // Energy
            'XLE', 'XOP', 'CVX', 'XOM', 'COP', 'SLB', 'HAL',
            // Semiconductors
            'TSM', 'QCOM', 'TXN', 'MU', 'AMAT', 'LRCX', 'KLAC',
            // EVs
            'F', 'GM', 'RIVN', 'LCID', 'NIO', 'LI', 'XPEV',
            // Crypto
            'COIN', 'MARA', 'RIOT', 'MSTR',
            // Sector ETFs
            'XLF', 'XLK', 'XLV', 'XLI', 'XLP', 'XLU', 'XLY',
            // High Volatility
            'GME', 'AMC', 'PLTR', 'SOFI',
            // Others
            'BABA', 'JD', 'BA', 'CAT', 'GE', 'GLD', 'SLV', 'TLT', 'USO'
        ];

        let scanResults = [];
        let currentFilter = 'all';
        let currentChart = null;

        // CORS proxy with fallback
        async function fetchWithProxy(url) {
            const proxies = [
                'https://api.allorigins.win/raw?url=',
                'https://corsproxy.io/?',
            ];

            for (let proxy of proxies) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(url));
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (e) {
                    continue;
                }
            }
            throw new Error('All proxies failed');
        }

        async function startScan() {
            const button = document.getElementById('scanButton');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const resultsContainer = document.getElementById('resultsContainer');

            button.disabled = true;
            button.textContent = '🔄 Scanning...';
            progressBar.style.display = 'block';
            scanResults = [];

            const total = WEEKLY_OPTIONS_SYMBOLS.length;
            let completed = 0;

            for (let symbol of WEEKLY_OPTIONS_SYMBOLS) {
                try {
                    const analysis = await analyzeSymbol(symbol);
                    if (analysis) {
                        scanResults.push(analysis);
                    }
                } catch (error) {
                    console.error(`Error scanning ${symbol}:`, error);
                }

                completed++;
                const percent = Math.round((completed / total) * 100);
                progressFill.style.width = percent + '%';
                progressFill.textContent = `${completed}/${total} (${percent}%) - Found ${scanResults.length}`;
            }

            displayResults();
            button.disabled = false;
            button.textContent = '🔍 Scan All Weekly Options';
            progressBar.style.display = 'none';
            resultsContainer.style.display = 'block';
        }

        async function analyzeSymbol(symbol) {
            // Fetch options data
            const url = `https://query2.finance.yahoo.com/v7/finance/options/${symbol}`;
            const data = await fetchWithProxy(url);

            if (!data.optionChain || !data.optionChain.result || data.optionChain.result.length === 0) {
                return null;
            }

            const result = data.optionChain.result[0];
            const quote = result.quote;
            const currentPrice = quote.regularMarketPrice;
            const expirations = result.expirationDates || [];

            if (expirations.length === 0) return null;

            // Get nearest weekly expiration
            const nextExpiration = expirations[0];
            const expDate = new Date(nextExpiration * 1000);
            const daysToExp = Math.round((expDate - new Date()) / (1000 * 60 * 60 * 24));

            // Check if it's a weekly (0-7 days)
            if (daysToExp > 7) return null;

            // Fetch historical data for technical analysis
            const historicalUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=60d`;
            const histData = await fetchWithProxy(historicalUrl);

            if (!histData.chart || !histData.chart.result) return null;

            const chartResult = histData.chart.result[0];
            const timestamps = chartResult.timestamp;
            const quotes = chartResult.indicators.quote[0];
            const closes = quotes.close.filter(p => p !== null);
            const highs = quotes.high.filter(p => p !== null);
            const lows = quotes.low.filter(p => p !== null);

            // Calculate technical indicators
            const sma20 = calculateSMA(closes, 20);
            const sma50 = calculateSMA(closes, 50);
            const ema9 = calculateEMA(closes, 9);
            const ema21 = calculateEMA(closes, 21);

            // Determine signal
            let signal = 'neutral';
            let signalStrength = 0;

            if (currentPrice > sma20 && sma20 > sma50 && ema9 > ema21) {
                signal = 'bullish';
                signalStrength = ((currentPrice - sma50) / sma50 * 100).toFixed(2);
            } else if (currentPrice < sma20 && sma20 < sma50 && ema9 < ema21) {
                signal = 'bearish';
                signalStrength = ((sma50 - currentPrice) / sma50 * 100).toFixed(2);
            }

            // Identify support and resistance
            const resistance = Math.max(...highs.slice(-20));
            const support = Math.min(...lows.slice(-20));

            // Calculate ideal strikes
            const atmStrike = Math.round(currentPrice / 5) * 5;
            const callStrike = signal === 'bullish' ? atmStrike + 5 : atmStrike;
            const putStrike = signal === 'bearish' ? atmStrike - 5 : atmStrike;

            return {
                symbol,
                currentPrice,
                signal,
                signalStrength,
                daysToExp,
                expDate: expDate.toLocaleDateString(),
                sma20,
                sma50,
                ema9,
                ema21,
                resistance,
                support,
                atmStrike,
                callStrike,
                putStrike,
                historicalData: {
                    timestamps,
                    closes,
                    highs,
                    lows
                }
            };
        }

        function calculateSMA(prices, period) {
            if (prices.length < period) return null;
            const slice = prices.slice(-period);
            return slice.reduce((a, b) => a + b, 0) / period;
        }

        function calculateEMA(prices, period) {
            if (prices.length < period) return null;
            const multiplier = 2 / (period + 1);
            let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
            for (let i = period; i < prices.length; i++) {
                ema = (prices[i] - ema) * multiplier + ema;
            }
            return ema;
        }

        function displayResults() {
            const resultsList = document.getElementById('resultsList');
            const resultsCount = document.getElementById('resultsCount');

            const filtered = scanResults.filter(r => {
                if (currentFilter === 'all') return true;
                return r.signal === currentFilter;
            });

            resultsCount.textContent = `${filtered.length} opportunities found`;

            if (filtered.length === 0) {
                resultsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div>No opportunities found for "${currentFilter}" filter</div>
                    </div>
                `;
                return;
            }

            resultsList.innerHTML = filtered.map(result => `
                <div class="result-item" onclick="showAnalysis('${result.symbol}')">
                    <div class="result-symbol">${result.symbol}</div>
                    <div class="result-info">
                        <div class="info-item">
                            <div class="info-label">Current Price</div>
                            <div class="info-value">$${result.currentPrice.toFixed(2)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Days to Expiration</div>
                            <div class="info-value">${result.daysToExp} DTE</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Signal Strength</div>
                            <div class="info-value">${result.signalStrength}%</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Ideal Strike</div>
                            <div class="info-value">$${result.signal === 'bullish' ? result.callStrike : result.putStrike}</div>
                        </div>
                    </div>
                    <div>
                        <div class="signal-badge signal-${result.signal}">
                            ${result.signal === 'bullish' ? '🟢 Bullish' : result.signal === 'bearish' ? '🔴 Bearish' : '🟡 Neutral'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterResults(filter) {
            currentFilter = filter;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            displayResults();
        }

        function showAnalysis(symbol) {
            const result = scanResults.find(r => r.symbol === symbol);
            if (!result) return;

            const modal = document.getElementById('analysisModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');

            modalTitle.textContent = `${symbol} - Detailed Analysis`;
            
            modalBody.innerHTML = `
                <div class="analysis-section">
                    <div class="section-title">📈 Price Chart with Technical Indicators</div>
                    <div class="chart-container">
                        <canvas id="priceChart" height="300"></canvas>
                    </div>
                </div>

                <div class="analysis-section">
                    <div class="section-title">🎯 Trading Zones</div>
                    <div class="signal-zones">
                        <div class="signal-zone bullish">
                            <div class="zone-title">🟢 Bullish Zone</div>
                            <div class="zone-price">$${result.resistance.toFixed(2)}</div>
                            <div class="zone-description">
                                <strong>Resistance Level</strong><br>
                                Price breaking above this level indicates strong bullish momentum.<br><br>
                                <strong>Action:</strong> Consider call options above $${result.callStrike}
                            </div>
                        </div>
                        <div class="signal-zone bearish">
                            <div class="zone-title">🔴 Bearish Zone</div>
                            <div class="zone-price">$${result.support.toFixed(2)}</div>
                            <div class="zone-description">
                                <strong>Support Level</strong><br>
                                Price breaking below this level indicates strong bearish momentum.<br><br>
                                <strong>Action:</strong> Consider put options below $${result.putStrike}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="analysis-section">
                    <div class="section-title">💡 Option Strike Recommendations</div>
                    <div class="recommendations">
                        ${result.signal === 'bullish' ? `
                            <div class="recommendation-item">
                                <div class="rec-title">🟢 BULLISH STRATEGY - Call Options</div>
                                <div class="rec-details">
                                    <div><strong>Recommended Strike:</strong> $${result.callStrike}</div>
                                    <div><strong>Expiration:</strong> ${result.expDate} (${result.daysToExp} DTE)</div>
                                    <div><strong>Entry:</strong> When price > $${result.sma20.toFixed(2)}</div>
                                    <div><strong>Target:</strong> $${result.resistance.toFixed(2)}</div>
                                </div>
                            </div>
                        ` : result.signal === 'bearish' ? `
                            <div class="recommendation-item">
                                <div class="rec-title">🔴 BEARISH STRATEGY - Put Options</div>
                                <div class="rec-details">
                                    <div><strong>Recommended Strike:</strong> $${result.putStrike}</div>
                                    <div><strong>Expiration:</strong> ${result.expDate} (${result.daysToExp} DTE)</div>
                                    <div><strong>Entry:</strong> When price < $${result.sma20.toFixed(2)}</div>
                                    <div><strong>Target:</strong> $${result.support.toFixed(2)}</div>
                                </div>
                            </div>
                        ` : `
                            <div class="recommendation-item">
                                <div class="rec-title">🟡 NEUTRAL STRATEGY - Straddle</div>
                                <div class="rec-details">
                                    <div><strong>Call Strike:</strong> $${result.callStrike}</div>
                                    <div><strong>Put Strike:</strong> $${result.putStrike}</div>
                                    <div><strong>Expiration:</strong> ${result.expDate} (${result.daysToExp} DTE)</div>
                                    <div><strong>Strategy:</strong> Buy both call and put at ATM</div>
                                </div>
                            </div>
                        `}

                        <div class="recommendation-item">
                            <div class="rec-title">📊 Technical Levels</div>
                            <div class="rec-details">
                                <div><strong>Current Price:</strong> $${result.currentPrice.toFixed(2)}</div>
                                <div><strong>SMA(20):</strong> $${result.sma20.toFixed(2)}</div>
                                <div><strong>SMA(50):</strong> $${result.sma50.toFixed(2)}</div>
                                <div><strong>Signal Strength:</strong> ${result.signalStrength}%</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            modal.style.display = 'block';

            // Create chart
            setTimeout(() => {
                createPriceChart(result);
            }, 100);
        }

        function createPriceChart(result) {
            const ctx = document.getElementById('priceChart');
            if (!ctx) return;

            if (currentChart) {
                currentChart.destroy();
            }

            const labels = result.historicalData.timestamps.slice(-60).map(ts => {
                const date = new Date(ts * 1000);
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            });

            const prices = result.historicalData.closes.slice(-60);

            // Calculate SMAs for chart
            const sma20Data = [];
            const sma50Data = [];
            for (let i = 0; i < prices.length; i++) {
                const slice = result.historicalData.closes.slice(Math.max(0, result.historicalData.closes.length - 60 + i - 19), result.historicalData.closes.length - 60 + i + 1);
                sma20Data.push(i >= 19 ? calculateSMA(slice, 20) : null);
                
                const slice50 = result.historicalData.closes.slice(Math.max(0, result.historicalData.closes.length - 60 + i - 49), result.historicalData.closes.length - 60 + i + 1);
                sma50Data.push(i >= 49 ? calculateSMA(slice50, 50) : null);
            }

            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Price',
                            data: prices,
                            borderColor: '#2d3436',
                            borderWidth: 2.5,
                            pointRadius: 0,
                        },
                        {
                            label: 'SMA(20)',
                            data: sma20Data,
                            borderColor: '#0984e3',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            pointRadius: 0,
                        },
                        {
                            label: 'SMA(50)',
                            data: sma50Data,
                            borderColor: '#6c5ce7',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            pointRadius: 0,
                        },
                        {
                            label: 'Resistance',
                            data: Array(prices.length).fill(result.resistance),
                            borderColor: '#d63031',
                            borderWidth: 2,
                            borderDash: [10, 5],
                            pointRadius: 0,
                        },
                        {
                            label: 'Support',
                            data: Array(prices.length).fill(result.support),
                            borderColor: '#00b894',
                            borderWidth: 2,
                            borderDash: [10, 5],
                            pointRadius: 0,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                        }
                    },
                    scales: {
                        y: {
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toFixed(2);
                                }
                            }
                        }
                    }
                }
            });
        }

        function closeAnalysis() {
            document.getElementById('analysisModal').style.display = 'none';
            if (currentChart) {
                currentChart.destroy();
                currentChart = null;
            }
        }

        // Auto-scan on load (optional - comment out if you want manual trigger)
        // window.addEventListener('load', () => {
        //     setTimeout(startScan, 1000);
        // });
    </script>
</body>
</html>
