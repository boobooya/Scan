name: Run Scanner

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - run: pip install yfinance pandas numpy

    - run: python scanner_free.py

    - run: |
        git config --global user.name "bot"
        git config --global user.email "bot@email.com"
        git add signals.json
        git commit -m "update" || echo "no change"
        git push
