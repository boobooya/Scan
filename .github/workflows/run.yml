name: Run Options Scanner

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - run: pip install --upgrade pip
    - run: pip install yfinance pandas numpy

    - name: Run Scanner
      run: python scanner_fast_safe.py

    - name: Commit signals
      run: |
        git config --global user.name "bot"
        git config --global user.email "bot@email.com"
        git add signals.json
        git commit -m "update signals $(date)" || echo "no change"
        git push
