<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0DTE BACKTEST — Straddle &amp; Strangle Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#03080d;--s1:#060d15;--s2:#0a1520;--s3:#0e1c2a;
  --wire:#152030;--wire2:#1c2e42;
  --dim:#2a4060;--muted:#456070;--ghost:#6888a0;--text:#a8c8dc;--bright:#cce4f4;--white:#e8f6ff;
  --up:#00eea0;--dn:#ff3355;--warn:#ffcc00;--info:#00ccff;--violet:#aa80ff;
  --strad:#00ccff;--strang:#aa80ff;
  --win:#00eea0;--loss:#ff3355;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:13px;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 35% at 15% 5%,rgba(0,204,255,.03),transparent),
             radial-gradient(ellipse 55% 30% at 85% 95%,rgba(0,238,160,.02),transparent);z-index:0;}
.app{position:relative;z-index:1;}

/* TOP */
.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  padding:11px 22px;border-bottom:1px solid var(--wire2);
  background:rgba(3,8,13,.93);backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:600;}
.logo{font-family:'Outfit',sans-serif;font-weight:800;font-size:18px;letter-spacing:2px;line-height:1;}
.logo em{color:var(--warn);font-style:normal;}
.logo b{color:var(--dn);}
.logo-sub{font-size:7px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:3px;font-family:'JetBrains Mono',monospace;}
.top-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pill{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:1px;padding:4px 10px;border-radius:2px;border:1px solid;}
.pill-clk{color:var(--info);border-color:rgba(0,204,255,.2);background:rgba(0,204,255,.04);}
.pill-mkt.open{color:var(--up);border-color:rgba(0,238,160,.25);background:rgba(0,238,160,.04);}
.pill-mkt.closed{color:var(--dn);border-color:rgba(255,51,85,.2);background:rgba(255,51,85,.04);}
.dot{width:5px;height:5px;border-radius:50%;animation:blink 1s step-end infinite;}
.dot.open{background:var(--up);}
.dot.closed{background:var(--dn);}
@keyframes blink{50%{opacity:0;}}

/* CTRL */
.ctrl{padding:12px 22px;background:var(--s1);border-bottom:1px solid var(--wire);
  display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
.cg{display:flex;flex-direction:column;gap:4px;}
.cl{font-size:8px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;}
select,input[type=number],input[type=text]{
  background:var(--s2);border:1px solid var(--wire2);color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 9px;border-radius:2px;outline:none;
  transition:border-color .15s;}
select:focus,input:focus{border-color:var(--info);}
.btn{font-family:'Outfit',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;padding:7px 16px;border-radius:2px;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap;}
.btn-go{background:var(--warn);color:#000;border-color:var(--warn);}
.btn-go:hover{background:#e6b400;}
.btn-go:disabled{opacity:.35;cursor:not-allowed;}
.btn-clr{color:var(--ghost);border-color:var(--wire2);background:transparent;}
.btn-clr:hover{color:var(--bright);border-color:var(--ghost);}

/* STATUS */
.sbar{padding:5px 22px;background:rgba(6,13,21,.8);border-bottom:1px solid var(--wire);
  display:flex;flex-wrap:wrap;gap:16px;align-items:center;}
.ss{font-size:9px;display:flex;gap:5px;align-items:center;}
.ss .l{color:var(--muted);letter-spacing:.8px;text-transform:uppercase;}
.ss .v{font-weight:500;}
.ss .v.g{color:var(--win);}
.ss .v.r{color:var(--loss);}
.ss .v.b{color:var(--info);}
.ss .v.w{color:var(--warn);}
.ss .v.v{color:var(--violet);}
.prog-wrap{flex:1;min-width:80px;max-width:240px;height:2px;background:var(--s3);border-radius:1px;overflow:hidden;display:none;}
.prog-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--warn),var(--up));transition:width .15s;}

/* TABS */
.tabs{padding:0 22px;border-bottom:1px solid var(--wire);background:var(--s1);
  display:flex;position:sticky;top:53px;z-index:500;overflow-x:auto;}
.tab{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);background:none;border:none;padding:9px 14px;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.on{color:var(--warn);border-bottom-color:var(--warn);}

/* MAIN */
.main{padding:16px 22px;}
.panel{display:none;}
.panel.on{display:block;}

/* LOG */
.log-box{background:var(--s2);border:1px solid var(--wire2);border-radius:2px;padding:10px;
  height:120px;overflow-y:auto;font-size:10px;margin-bottom:14px;}
.log-line{padding:1px 0;border-bottom:1px solid rgba(21,32,48,.3);}
.log-line.ok{color:var(--up);}
.log-line.info{color:var(--info);}
.log-line.warn{color:var(--warn);}
.log-line.err{color:var(--dn);}
.log-line.dim{color:var(--ghost);}

/* OVERVIEW KPIS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:16px;}
.kpi{background:var(--s1);border:1px solid var(--wire2);border-radius:2px;padding:11px;}
.kpi .k{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.kpi .v{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;}
.kpi .sub{font-size:8px;color:var(--ghost);margin-top:2px;}

/* SEC HEADER */
.sh{font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;
  text-transform:uppercase;color:var(--ghost);margin:16px 0 10px;
  display:flex;align-items:center;gap:8px;}
.sh::after{content:'';flex:1;height:1px;background:var(--wire2);}

/* TABLES */
.tw{overflow-x:auto;border:1px solid var(--wire2);border-radius:2px;margin-bottom:16px;}
table{width:100%;border-collapse:collapse;font-size:10px;}
thead tr{background:var(--s2);}
thead th{padding:7px 9px;text-align:left;font-size:8px;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);font-weight:500;border-bottom:1px solid var(--wire2);white-space:nowrap;
  position:sticky;top:0;z-index:2;background:var(--s2);}
thead th.sh-strad{color:var(--strad);}
thead th.sh-strang{color:var(--strang);}
tbody tr{border-bottom:1px solid rgba(21,32,48,.5);transition:background .1s;}
tbody tr:hover{background:rgba(0,204,255,.02);}
tbody tr:last-child{border-bottom:none;}
tbody tr.tr-sum td{background:rgba(20,35,52,.5);font-weight:600;}
tbody tr.tr-sym td:first-child{font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;color:var(--warn);}
td{padding:6px 9px;vertical-align:middle;}
td.tc{color:var(--info);font-size:9px;}
td.tw-{color:var(--ghost);font-size:10px;}
td.tg{color:var(--win);font-weight:500;}
td.tr{color:var(--loss);font-weight:500;}
td.ty{color:var(--warn);}

.wb{display:inline-flex;align-items:center;gap:2px;font-size:8px;padding:2px 6px;border-radius:1px;border:1px solid;font-weight:600;}
.wb.good{color:var(--win);border-color:rgba(0,238,160,.22);background:rgba(0,238,160,.06);}
.wb.ok{color:var(--warn);border-color:rgba(255,204,0,.22);background:rgba(255,204,0,.06);}
.wb.poor{color:var(--loss);border-color:rgba(255,51,85,.22);background:rgba(255,51,85,.06);}

/* CHART */
.cv-box{background:var(--s1);border:1px solid var(--wire2);border-radius:2px;padding:14px;margin-bottom:14px;}
.cv-box h4{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ghost);margin-bottom:12px;}
canvas{width:100%!important;display:block;}

/* EMPTY */
.empty{padding:50px;text-align:center;}
.empty-big{font-family:'Outfit',sans-serif;font-size:44px;font-weight:800;opacity:.05;color:var(--warn);margin-bottom:8px;}
.empty p{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--wire2);border-radius:2px;}
@media(max-width:600px){.top,.ctrl,.sbar,.tabs,.main{padding-left:10px;padding-right:10px;}}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════
var TZ = 'America/Los_Angeles';
function nowPST() { return new Date(new Date().toLocaleString('en-US', {timeZone: TZ})); }
function toPST(d) { return new Date(d.toLocaleString('en-US', {timeZone: TZ})); }
function fmtT(d) { return d.toLocaleTimeString('en-US', {timeZone: TZ, hour: '2-digit', minute: '2-digit', hour12: true}); }
function fmtDate(d) { return d.toLocaleDateString('en-US', {timeZone: TZ, month: 'short', day: 'numeric'}); }
function isOpen() {
  var p = nowPST(), h = p.getHours(), m = p.getMinutes(), dw = p.getDay();
  if (dw === 0 || dw === 6) return false;
  var mn = h * 60 + m;
  return mn >= 390 && mn < 780;
}
(function tick() {
  var p = nowPST();
  document.getElementById('clk').textContent = p.toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true}) + ' PST';
  var op = isOpen();
  document.getElementById('mkt-pill').className = 'pill pill-mkt ' + (op ? 'open' : 'closed');
  document.getElementById('mkt-dot').className = 'dot ' + (op ? 'open' : 'closed');
  document.getElementById('mkt-lbl').textContent = op ? 'MARKET OPEN' : 'MARKET CLOSED';
  setTimeout(tick, 1000);
})();

// ═══════════════════════════════════════════════════════════
// PRESETS
// ═══════════════════════════════════════════════════════════
var PRESETS = {
  top10: 'SPY,QQQ,AAPL,TSLA,NVDA,AMZN,META,AMD,MSFT,GOOGL',
  etf:   'SPY,QQQ,IWM,DIA,GLD,TLT,XLF,XLK,XLE,SQQQ,TQQQ,VXX',
  tech:  'AAPL,MSFT,NVDA,AMD,META,GOOGL,AMZN,TSLA,ADBE,CRM',
  meme:  'GME,AMC,PLTR,COIN,MSTR,RIOT,MARA,SOFI,HOOD,RIVN'
};
function applyPreset() {
  var v = document.getElementById('preset').value;
  if (v && PRESETS[v]) document.getElementById('syms').value = PRESETS[v];
}

// ═══════════════════════════════════════════════════════════
// LOGGING
// ═══════════════════════════════════════════════════════════
function log(msg, cls) {
  var box = document.getElementById('logbox');
  var line = document.createElement('div');
  line.className = 'log-line ' + (cls || 'info');
  line.textContent = '[' + nowPST().toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true}) + '] ' + msg;
  box.insertBefore(line, box.firstChild);
  if (box.children.length > 60) box.removeChild(box.lastChild);
}

// ═══════════════════════════════════════════════════════════
// SEEDED RNG
// ═══════════════════════════════════════════════════════════
function seededRng(seed) {
  var s = seed + 1;
  return function() { s = Math.sin(s) * 99991; return s - Math.floor(s); };
}

// ═══════════════════════════════════════════════════════════
// SYNTHETIC BAR GENERATOR  
// Anchored to 6:30 AM PST = 14:30 UTC each trading day
// ═══════════════════════════════════════════════════════════
function makeBars(sym, tradingDays) {
  var MS_PER_BAR = 300000; // 5 minutes
  var BARS_PER_DAY = 78;   // 6:30-13:00 PST = 390 mins / 5 = 78 bars
  var PST_OPEN_UTC_MS = 14 * 3600000 + 30 * 60000; // 14:30 UTC = 6:30 PST

  var rng = seededRng(sym.split('').reduce(function(a, c) { return a + c.charCodeAt(0); }, 0));
  var baseVol = 0.002 + rng() * 0.018;
  var price = 20 + rng() * 450;
  var bars = [];
  var nowMs = Date.now();

  for (var d = 0; d < tradingDays + 10; d++) {
    if (bars.length >= tradingDays * BARS_PER_DAY) break;
    // Midnight UTC for each past day
    var dayMs = nowMs - (tradingDays + 10 - d) * 86400000;
    var midnightUtc = Math.floor(dayMs / 86400000) * 86400000;
    var marketOpenMs = midnightUtc + PST_OPEN_UTC_MS;
    // Skip weekends: check day of week at market open
    var dayOfWeek = new Date(marketOpenMs).getUTCDay(); // 0=Sun,6=Sat
    if (dayOfWeek === 0 || dayOfWeek === 6) continue;

    for (var b = 0; b < BARS_PER_DAY; b++) {
      var frac = b / BARS_PER_DAY;
      // Vol profile: high at open and close, low at lunch
      var vm = frac < 0.12 ? 2.8 : (frac > 0.88 ? 2.2 : (frac > 0.38 && frac < 0.55 ? 0.65 : 1.0));
      var vol = baseVol * vm;
      if (rng() > 0.96) vol *= 5; // spike event
      var chg = (rng() - 0.478) * 2 * vol;
      var op = price;
      price = price * (1 + chg);
      var barMs = marketOpenMs + b * MS_PER_BAR;
      bars.push({
        ts: Math.floor(barMs / 1000),
        dt: new Date(barMs),
        open: op,
        close: price,
        high: Math.max(op, price) * (1 + rng() * 0.001),
        low: Math.min(op, price) * (1 - rng() * 0.001),
        vol: Math.floor(rng() * 2000000 + 50000)
      });
    }
  }
  return bars;
}

// ═══════════════════════════════════════════════════════════
// REAL DATA FETCH (optional enhancement, non-blocking)
// ═══════════════════════════════════════════════════════════
function fetchReal(sym, days, callback) {
  var range = days <= 22 ? '1mo' : days <= 44 ? '2mo' : '3mo';
  var url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(sym) +
            '?interval=5m&range=' + range + '&includePrePost=false';
  var proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
  var ctrl = new AbortController();
  var tid = setTimeout(function() { ctrl.abort(); }, 7000);
  fetch(proxy, {signal: ctrl.signal})
    .then(function(r) { clearTimeout(tid); return r.json(); })
    .then(function(data) {
      var res = data && data.chart && data.chart.result && data.chart.result[0];
      if (!res || !res.timestamp) { callback(null); return; }
      var ts = res.timestamp;
      var q = (res.indicators && res.indicators.quote && res.indicators.quote[0]) || {};
      var bars = [];
      for (var i = 0; i < ts.length; i++) {
        var c = q.close && q.close[i], o = q.open && q.open[i];
        if (c == null || o == null || isNaN(+c) || isNaN(+o)) continue;
        var dt = new Date(ts[i] * 1000);
        var p = toPST(dt), h = p.getHours(), m = p.getMinutes(), dw = p.getDay();
        if (dw === 0 || dw === 6) continue;
        var mn = h * 60 + m;
        if (mn < 390 || mn > 780) continue;
        bars.push({ts: ts[i], dt: dt, open: +o, close: +c,
          high: +(q.high && q.high[i] || c), low: +(q.low && q.low[i] || c),
          vol: +(q.volume && q.volume[i] || 0)});
      }
      callback(bars.length > 20 ? bars : null);
    })
    .catch(function() { clearTimeout(tid); callback(null); });
}

// ═══════════════════════════════════════════════════════════
// BLACK-SCHOLES
// ═══════════════════════════════════════════════════════════
function normCDF(x) {
  var a1=0.254829592, a2=-0.284496736, a3=1.421413741, a4=-1.453152027, a5=1.061405429, p=0.3275911;
  var sign = x < 0 ? -1 : 1;
  x = Math.abs(x) / Math.sqrt(2);
  var t = 1.0 / (1.0 + p * x);
  var y = 1.0 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return 0.5 * (1.0 + sign * y);
}
function normPDF(x) { return Math.exp(-0.5*x*x) / Math.sqrt(2*Math.PI); }

function bsPrice(S, K, T, r, sigma, isCall) {
  if (T <= 0 || sigma <= 0 || S <= 0 || K <= 0) return Math.max(0, isCall ? S - K : K - S);
  var sqrtT = Math.sqrt(T);
  var d1 = (Math.log(S/K) + (r + 0.5*sigma*sigma)*T) / (sigma*sqrtT);
  var d2 = d1 - sigma*sqrtT;
  if (isCall) return Math.max(0, S*normCDF(d1) - K*Math.exp(-r*T)*normCDF(d2));
  return Math.max(0, K*Math.exp(-r*T)*normCDF(-d2) - S*normCDF(-d1));
}

function estimateIV(bars, n) {
  n = Math.min(n, bars.length);
  if (n < 2) return 0.30;
  var sl = bars.slice(-n);
  var rets = [];
  for (var i = 1; i < sl.length; i++) {
    if (sl[i].close > 0 && sl[i-1].close > 0)
      rets.push(Math.log(sl[i].close / sl[i-1].close));
  }
  if (rets.length < 2) return 0.30;
  var avg = rets.reduce(function(a,b){return a+b;},0) / rets.length;
  var variance = rets.reduce(function(a,b){return a+(b-avg)*(b-avg);},0) / rets.length;
  return Math.max(0.10, Math.min(4.0, Math.sqrt(variance * 252)));
}

function strikeInc(price) {
  return price < 5 ? 0.5 : price < 20 ? 1 : price < 50 ? 2.5 : price < 100 ? 5 : price < 200 ? 10 : price < 500 ? 25 : 50;
}

// ═══════════════════════════════════════════════════════════
// SPIKE DETECTION
// ═══════════════════════════════════════════════════════════
function detectSpikes(bars, thr) {
  var spikes = [];
  for (var i = 1; i < bars.length - 10; i++) {
    var p = bars[i-1].close, c = bars[i].close;
    if (!p || !c || p <= 0) continue;
    var pct = (c - p) / p * 100;
    if (Math.abs(pct) < thr) continue;
    var pd = toPST(bars[i].dt);
    spikes.push({
      idx: i, pct: Math.round(pct * 1000) / 1000,
      dir: pct > 0 ? 'up' : 'dn',
      dt: bars[i].dt,
      h: pd.getHours(), m: pd.getMinutes(),
      dw: pd.getDay(),
      day: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][pd.getDay()],
      timeLabel: pd.getHours() + ':' + (pd.getMinutes() < 10 ? '0' : '') + pd.getMinutes() + ' PST'
    });
  }
  return spikes;
}

// ═══════════════════════════════════════════════════════════
// TRADE CALCULATOR
// ═══════════════════════════════════════════════════════════
function calcTrade(bars, sp, holdBars, wings, slip) {
  var ei = sp.idx;
  if (ei >= bars.length - 1) return null;
  var eb = bars[ei];
  var S = eb.close;
  if (!S || S <= 0) return null;

  var inc = strikeInc(S);
  var atm = Math.round(S / inc) * inc;
  var kCall = atm + wings * inc;
  var kPut  = atm - wings * inc;

  // Time remaining in day (PST closes at 13:00 = 780 mins from midnight)
  var pe = toPST(eb.dt);
  var entMin = pe.getHours() * 60 + pe.getMinutes();
  var minsLeft = Math.max(5, 780 - entMin);
  var T0 = minsLeft / (252 * 390);

  // IV from last 20 bars
  var iv = estimateIV(bars.slice(0, ei + 1), 20);
  var r = 0.05;

  // Entry premiums
  var sCallE = bsPrice(S, atm,  T0, r, iv, true);
  var sPutE  = bsPrice(S, atm,  T0, r, iv, false);
  var gCallE = bsPrice(S, kCall, T0, r, iv, true);
  var gPutE  = bsPrice(S, kPut,  T0, r, iv, false);

  var sPrem = sCallE + sPutE + 2 * slip;
  var gPrem = gCallE + gPutE + 2 * slip;
  if (sPrem <= 0 || gPrem <= 0) return null;

  // Exit
  var xi = Math.min(ei + holdBars, bars.length - 1);
  var xb = bars[xi];
  var Sx = xb.close;
  if (!Sx || Sx <= 0) return null;

  var px = toPST(xb.dt);
  var exMin = px.getHours() * 60 + px.getMinutes();
  var minsLeftX = Math.max(1, 780 - exMin);
  var T1 = minsLeftX / (252 * 390);
  var ivX = iv * (T1 / T0 < 0.5 ? 0.85 : 1.0);

  var sCallX = bsPrice(Sx, atm,  T1, r, ivX, true);
  var sPutX  = bsPrice(Sx, atm,  T1, r, ivX, false);
  var gCallX = bsPrice(Sx, kCall, T1, r, ivX, true);
  var gPutX  = bsPrice(Sx, kPut,  T1, r, ivX, false);

  var sExitVal = sCallX + sPutX - 2 * slip;
  var gExitVal = gCallX + gPutX - 2 * slip;

  var sPnL = sExitVal - sPrem;
  var gPnL = gExitVal - gPrem;
  var sRet = (sPnL / sPrem) * 100;
  var gRet = (gPnL / gPrem) * 100;

  return {
    sym: '', sp: sp,
    entryTime: fmtT(eb.dt), exitTime: fmtT(xb.dt),
    entryDate: fmtDate(eb.dt),
    entryDt: eb.dt, exitDt: xb.dt,
    S: Math.round(S * 100) / 100,
    Sx: Math.round(Sx * 100) / 100,
    atm: atm, kCall: kCall, kPut: kPut, inc: inc,
    iv: Math.round(iv * 1000) / 10,
    move: Math.round(Math.abs(Sx - S) / S * 10000) / 100,
    minsLeft: minsLeft,
    sPrem: Math.round(sPrem * 1000) / 1000,
    sExit: Math.round(sExitVal * 1000) / 1000,
    sPnL: Math.round(sPnL * 1000) / 1000,
    sRet: Math.round(sRet * 10) / 10,
    sWin: sPnL > 0,
    gPrem: Math.round(gPrem * 1000) / 1000,
    gExit: Math.round(gExitVal * 1000) / 1000,
    gPnL: Math.round(gPnL * 1000) / 1000,
    gRet: Math.round(gRet * 10) / 10,
    gWin: gPnL > 0,
    holdMins: holdBars * 5
  };
}

// ═══════════════════════════════════════════════════════════
// STATS HELPER
// ═══════════════════════════════════════════════════════════
function stats(trades) {
  if (!trades.length) return null;
  var n = trades.length;
  var sw = 0, gw = 0, sRetSum = 0, gRetSum = 0, sPnLSum = 0, gPnLSum = 0, mvSum = 0;
  var sRetMax = -9999, sRetMin = 9999;
  trades.forEach(function(t) {
    if (t.sWin) sw++; if (t.gWin) gw++;
    sRetSum += t.sRet; gRetSum += t.gRet;
    sPnLSum += t.sPnL; gPnLSum += t.gPnL;
    mvSum += t.move;
    if (t.sRet > sRetMax) sRetMax = t.sRet;
    if (t.sRet < sRetMin) sRetMin = t.sRet;
  });
  var sAvgRet = sRetSum / n, gAvgRet = gRetSum / n;
  var sStd = Math.sqrt(trades.reduce(function(a,t){return a+(t.sRet-sAvgRet)*(t.sRet-sAvgRet);},0)/n);
  var gStd = Math.sqrt(trades.reduce(function(a,t){return a+(t.gRet-gAvgRet)*(t.gRet-gAvgRet);},0)/n);
  return {
    n: n, sw: sw, gw: gw,
    sWR: Math.round(sw/n*100), gWR: Math.round(gw/n*100),
    sAvgRet: Math.round(sAvgRet*10)/10, gAvgRet: Math.round(gAvgRet*10)/10,
    sPnLSum: Math.round(sPnLSum*100)/100, gPnLSum: Math.round(gPnLSum*100)/100,
    avgMove: Math.round(mvSum/n*100)/100,
    sRetMax: Math.round(sRetMax*10)/10, sRetMin: Math.round(sRetMin*10)/10,
    sSharpe: sStd>0 ? Math.round(sAvgRet/sStd*100)/100 : 0,
    gSharpe: gStd>0 ? Math.round(gAvgRet/gStd*100)/100 : 0
  };
}

var ALL = [];  // array of {sym, price, bars, spikes, t30, t45}

// ═══════════════════════════════════════════════════════════
// MAIN BACKTEST RUNNER
// ═══════════════════════════════════════════════════════════
function startBT() {
  var btn = document.getElementById('btn-run');
  btn.disabled = true;
  document.getElementById('prog-wrap').style.display = 'block';
  document.getElementById('logbox').innerHTML = '';

  var rawSyms = document.getElementById('syms').value;
  var syms = rawSyms.split(/[,\s]+/).map(function(s){return s.trim().toUpperCase();}).filter(Boolean);
  var days = parseInt(document.getElementById('lbdays').value) || 44;
  var thr  = parseFloat(document.getElementById('thr').value) || 1.0;
  var wings= parseInt(document.getElementById('wings').value) || 2;
  var slip = parseFloat(document.getElementById('slip').value) || 0.05;

  ALL = [];
  log('Starting backtest: ' + syms.length + ' symbols, ' + days + ' trading days, spike>=' + thr + '%', 'info');

  // Process all symbols synchronously with synthetic data, then try to enhance with real data
  var processed = 0;

  function processOne(si) {
    if (si >= syms.length) {
      finalize();
      return;
    }
    var sym = syms[si];
    setProg(Math.round((si / syms.length) * 85));

    // Generate synth bars immediately (always works)
    var synthBars = makeBars(sym, days);
    processSymbol(sym, synthBars, thr, wings, slip);
    processed++;

    log(sym + ': synth ' + synthBars.length + ' bars, ' + (ALL[ALL.length-1] ? ALL[ALL.length-1].spikes.length : 0) + ' spikes, ' + (ALL[ALL.length-1] ? ALL[ALL.length-1].t30.length : 0) + ' trades', 'dim');
    updateStatus();

    // Try real data in background (non-blocking)
    (function(symCopy, idxCopy) {
      fetchReal(symCopy, days, function(realBars) {
        if (realBars && realBars.length > 20) {
          // Replace with real data
          var existing = ALL.find(function(r) { return r.sym === symCopy; });
          if (existing) {
            existing.bars = realBars;
            existing.price = realBars[realBars.length-1].close;
            existing.spikes = detectSpikes(realBars, thr);
            existing.t30 = [];
            existing.t45 = [];
            existing.spikes.forEach(function(sp) {
              var t3 = calcTrade(realBars, sp, 6, wings, slip);
              var t4 = calcTrade(realBars, sp, 9, wings, slip);
              if (t3) { t3.sym = symCopy; existing.t30.push(t3); }
              if (t4) { t4.sym = symCopy; existing.t45.push(t4); }
            });
            log(symCopy + ': upgraded to REAL data — ' + realBars.length + ' bars, ' + existing.spikes.length + ' spikes', 'ok');
            updateStatus();
            renderAll();
          }
        }
      });
    })(sym, si);

    // Next symbol on next tick to keep UI responsive
    setTimeout(function() { processOne(si + 1); }, 0);
  }

  processOne(0);

  function finalize() {
    setProg(100);
    setTimeout(function() {
      document.getElementById('prog-wrap').style.display = 'none';
      setProg(0);
    }, 500);
    btn.disabled = false;
    log('Backtest complete: ' + ALL.length + ' symbols processed', 'ok');
    renderAll();
  }
}

function processSymbol(sym, bars, thr, wings, slip) {
  var spikes = detectSpikes(bars, thr);
  var t30 = [], t45 = [];
  spikes.forEach(function(sp) {
    var t3 = calcTrade(bars, sp, 6, wings, slip);
    var t4 = calcTrade(bars, sp, 9, wings, slip);
    if (t3) { t3.sym = sym; t30.push(t3); }
    if (t4) { t4.sym = sym; t45.push(t4); }
  });
  ALL.push({sym: sym, price: bars[bars.length-1].close, bars: bars, spikes: spikes, t30: t30, t45: t45});
}

function updateStatus() {
  var allT30 = ALL.flatMap ? ALL.flatMap(function(r){return r.t30;}) : [].concat.apply([], ALL.map(function(r){return r.t30;}));
  var allT45 = ALL.flatMap ? ALL.flatMap(function(r){return r.t45;}) : [].concat.apply([], ALL.map(function(r){return r.t45;}));
  var totalSpikes = ALL.reduce(function(a,r){return a+r.spikes.length;},0);
  document.getElementById('st-s').textContent = ALL.length;
  document.getElementById('st-sp').textContent = totalSpikes;
  document.getElementById('st-tr').textContent = allT30.length;
  if (allT30.length) {
    var sw30 = allT30.filter(function(t){return t.sWin;}).length;
    var gw30 = allT30.filter(function(t){return t.gWin;}).length;
    document.getElementById('st-sw3').textContent = Math.round(sw30/allT30.length*100)+'%';
    document.getElementById('st-gw3').textContent = Math.round(gw30/allT30.length*100)+'%';
  }
  if (allT45.length) {
    var sw45 = allT45.filter(function(t){return t.sWin;}).length;
    var gw45 = allT45.filter(function(t){return t.gWin;}).length;
    document.getElementById('st-sw4').textContent = Math.round(sw45/allT45.length*100)+'%';
    document.getElementById('st-gw4').textContent = Math.round(gw45/allT45.length*100)+'%';
  }
}

      r.sym + ' <span style="color:var(--ghost);font-size:9px;font-family:JetBrains Mono,monospace">$' + r.price.toFixed(2) + ' · ' + r.spikes.length + ' spikes · ' + r.t30.length + ' trades</span></div>';
    html += '<div class="tw" style="margin-bottom:14px"><table>' + compTblHdr() + '<tbody>';
    skeys.forEach(function(k) {
      var t30 = symSlots30[k] || [], t45 = symSlots45[k] || [];
      var s30 = stats(t30) || {sWR:0,gWR:0,sAvgRet:0,gAvgRet:0,avgMove:0,n:0};
      var s45 = stats(t45) || {sWR:0,gWR:0,sAvgRet:0,gAvgRet:0,avgMove:0,n:0};
      html += wrRow(k, s30, s45);
    });
    // Summary row
    var sAll30 = stats(r.t30), sAll45 = stats(r.t45);
    if (sAll30 && sAll45) {
      html += '<tr class="tr-sum">' +
        '<td style="color:var(--warn)">TOTAL ' + r.sym + '</td>' +
        '<td><span class="wb ' + wbClass(sAll30.sWR) + '">' + sAll30.sWR + '%</span></td>' +
        '<td class="' + colorClass(sAll30.sAvgRet) + '">' + pctStr(sAll30.sAvgRet) + '</td>' +
        '<td><span class="wb ' + wbClass(sAll30.gWR) + '">' + sAll30.gWR + '%</span></td>' +
        '<td class="' + colorClass(sAll30.gAvgRet) + '">' + pctStr(sAll30.gAvgRet) + '</td>' +
        '<td><span class="wb ' + wbClass(sAll45.sWR) + '">' + sAll45.sWR + '%</span></td>' +
        '<td class="' + colorClass(sAll45.sAvgRet) + '">' + pctStr(sAll45.sAvgRet) + '</td>' +
        '<td><span class="wb ' + wbClass(sAll45.gWR) + '">' + sAll45.gWR + '%</span></td>' +
        '<td class="' + colorClass(sAll45.gAvgRet) + '">' + pctStr(sAll45.gAvgRet) + '</td>' +
        '<td class="ty">' + sAll30.avgMove + '%</td>' +
        '<td>' + sAll30.n + '</td>' +
        '</tr>';
    }
    html += '</tbody></table></div>';
  });

  wrap.innerHTML = html;
}

function renderSymbols() {
  var wrap = document.getElementById('sym');
  if (!ALL.length) { wrap.innerHTML = '<div class="empty"><p>No data</p></div>'; return; }

  var sorted = ALL.slice().sort(function(a, b) {
    var sa = stats(a.t30), sb = stats(b.t30);
    return (sb ? sb.sWR : 0) - (sa ? sa.sWR : 0);
  });

  var html = '<div class="sh">Symbol Summary</div>';
  html += '<div class="tw"><table><thead><tr>' +
    '<th>Symbol</th><th>Price</th><th>ATM</th><th>Spikes</th><th>Trades</th>' +
    '<th class="sh-strad">STR WR 30m</th><th class="sh-strad">STR Ret 30m</th>' +
    '<th class="sh-strad">STR WR 45m</th><th class="sh-strad">STR Ret 45m</th>' +
    '<th class="sh-strang">GLA WR 30m</th><th class="sh-strang">GLA Ret 30m</th>' +
    '<th class="sh-strang">GLA WR 45m</th><th class="sh-strang">GLA Ret 45m</th>' +
    '<th>Avg Move</th><th>Sharpe 30m</th>' +
    '</tr></thead><tbody>';

  sorted.forEach(function(r) {
    var s30 = stats(r.t30), s45 = stats(r.t45);

    var inc = strikeInc(r.price);
    var atm = Math.round(r.price / inc) * inc;
    html += '<tr>' +
      '<td style="font-family:Outfit,sans-serif;font-weight:700;font-size:13px;color:' + (s30.sWR>=55?'var(--win)':s30.sWR>=45?'var(--warn)':'var(--loss)') + '">' + r.sym + '</td>' +
      '<td class="ty">$' + r.price.toFixed(2) + '</td>' +
      '<td class="ty">$' + atm + '</td>' +
      '<td class="tw-">' + r.spikes.length + '</td>' +
      '<td class="tw-">' + s30.n + '</td>' +
      '<td><span class="wb ' + wbClass(s30.sWR) + '">' + s30.sWR + '%</span></td>' +
      '<td class="' + colorClass(s30.sAvgRet) + '">' + pctStr(s30.sAvgRet) + '</td>' +
      '<td><span class="wb ' + wbClass(s45.sWR) + '">' + s45.sWR + '%</span></td>' +
      '<td class="' + colorClass(s45.sAvgRet) + '">' + pctStr(s45.sAvgRet) + '</td>' +
      '<td><span class="wb ' + wbClass(s30.gWR) + '">' + s30.gWR + '%</span></td>' +
      '<td class="' + colorClass(s30.gAvgRet) + '">' + pctStr(s30.gAvgRet) + '</td>' +
      '<td><span class="wb ' + wbClass(s45.gWR) + '">' + s45.gWR + '%</span></td>' +
      '<td class="' + colorClass(s45.gAvgRet) + '">' + pctStr(s45.gAvgRet) + '</td>' +
      '<td class="ty">' + s30.avgMove + '%</td>' +
      '<td style="color:' + (s30.sSharpe>0.3?'var(--win)':s30.sSharpe>0?'var(--warn)':'var(--loss)') + '">' + s30.sSharpe + '</td>' +
      '</tr>';
  });
  html += '</tbody></table></div>';
  wrap.innerHTML = html;
}

      '<td class="tw-">' + t.iv + '</td>' +
      '<td class="' + (t.move >= 2 ? 'tg' : 'tw-') + '">' + t.move + '</td>' +
      '<td class="tw-">' + t.minsLeft + 'm</td>' +
      '<td class="tw-">$' + t.sPrem + '</td>' +
      '<td class="tw-">$' + t.sExit + '</td>' +
      '<td class="' + colorClass(t.sPnL) + '">' + pnlStr(t.sPnL) + '</td>' +
      '<td class="' + colorClass(t.sRet) + '">' + pctStr(t.sRet) + '</td>' +
      '<td class="' + (t.sWin ? 'tg' : 'tr') + '" style="font-weight:600">' + (t.sWin ? 'WIN' : 'LOSS') + '</td>' +
      '<td class="tw-">$' + t.gPrem + '</td>' +
      '<td class="tw-">$' + t.gExit + '</td>' +

// CHARTS
// ═══════════════════════════════════════════════════════════
function renderCharts() {
  var wrap = document.getElementById('ch');
  if (!ALL.length) { wrap.innerHTML = '<div class="empty"><p>No data</p></div>'; return; }
  wrap.innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' +
    '<div class="cv-box"><h4>Straddle Win Rate by Symbol (30m)</h4><canvas id="cv1" height="200"></canvas></div>' +
    '<div class="cv-box"><h4>Win Rate by Hour Slot — Strad vs Gla (30m)</h4><canvas id="cv2" height="200"></canvas></div>' +
    '<div class="cv-box"><h4>Return Distribution — Straddle 30m</h4><canvas id="cv3" height="200"></canvas></div>' +
    '<div class="cv-box"><h4>Cumulative PnL — Straddle vs Strangle 30m</h4><canvas id="cv4" height="200"></canvas></div>' +
    '</div>';
  setTimeout(function() { drawCharts(); }, 30);
}

function drawCharts() {
  drawWR(); drawHour(); drawDist(); drawCum();
}

function canvasSetup(id) {
  var cv = document.getElementById(id);
  if (!cv || !cv.offsetWidth) return null;
  var ctx = cv.getContext('2d');
  cv.width = cv.offsetWidth * 2; cv.height = cv.height * 2;
  ctx.scale(2, 2);
  var W = cv.offsetWidth, H = cv.height / 2;
  ctx.clearRect(0,0,W,H); ctx.fillStyle = '#03080d'; ctx.fillRect(0,0,W,H);
  return {ctx:ctx, W:W, H:H, p:{t:14,r:12,b:40,l:44}};
}

function drawWR() {
  var c = canvasSetup('cv1'); if (!c) return;
  var ctx=c.ctx,W=c.W,H=c.H,p=c.p;
  var cw=W-p.l-p.r, ch=H-p.t-p.b;
  var data = ALL.map(function(r) {
    var s = stats(r.t30);
    return {sym:r.sym, wr:s?s.sWR:0};
  }).sort(function(a,b){return b.wr-a.wr;});
  drawGrid(ctx,p,cw,ch,W,H,4,100);
  // 50% line
  var y50=p.t+ch*0.5; ctx.strokeStyle='rgba(255,204,0,.25)'; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(p.l,y50); ctx.lineTo(p.l+cw,y50); ctx.stroke(); ctx.setLineDash([]);
  var bw = Math.max(4, Math.floor(cw/data.length)-2);
  data.forEach(function(d,i) {
    var x=p.l+i*(cw/data.length)+1;
    var bh=Math.max(2,Math.round((d.wr/100)*ch));
    ctx.fillStyle=d.wr>=60?'rgba(0,238,160,.85)':d.wr>=45?'rgba(255,204,0,.85)':'rgba(255,51,85,.85)';
    ctx.fillRect(x,p.t+ch-bh,bw,bh);
    ctx.save(); ctx.translate(x+bw/2,H-5); ctx.rotate(-Math.PI/3);
    ctx.fillStyle='rgba(104,136,160,.7)'; ctx.font='8px JetBrains Mono'; ctx.textAlign='right';
    ctx.fillText(d.sym,0,0); ctx.restore();
    ctx.fillStyle='rgba(220,240,255,.7)'; ctx.font='7px JetBrains Mono'; ctx.textAlign='center';
    ctx.fillText(d.wr+'%',x+bw/2,p.t+ch-bh-3);
  });
}

function drawHour() {
  var c = canvasSetup('cv2'); if (!c) return;
  var ctx=c.ctx,W=c.W,H=c.H,p=c.p;
  var cw=W-p.l-p.r, ch=H-p.t-p.b;
  var slotS={}, slotG={};
  ALL.forEach(function(r) {
    r.t30.forEach(function(t) {
      var k=t.sp.h;
      if(!slotS[k])slotS[k]=[]; if(!slotG[k])slotG[k]=[];
      slotS[k].push(t.sWin?1:0); slotG[k].push(t.gWin?1:0);
    });
  });
  var keys = Object.keys(slotS).sort(function(a,b){return +a-+b;});
  drawGrid(ctx,p,cw,ch,W,H,4,100);
  var y50=p.t+ch*0.5; ctx.strokeStyle='rgba(255,204,0,.25)'; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(p.l,y50); ctx.lineTo(p.l+cw,y50); ctx.stroke(); ctx.setLineDash([]);
  var gw=Math.floor(cw/keys.length)-2;
  keys.forEach(function(k,i) {
    var x=p.l+i*(cw/keys.length)+1;
    var sw=slotS[k]?Math.round(slotS[k].reduce(function(a,b){return a+b;},0)/slotS[k].length*100):0;
    var gw_=slotG[k]?Math.round(slotG[k].reduce(function(a,b){return a+b;},0)/slotG[k].length*100):0;
    var hw=Math.floor(gw/2)-1;
    ctx.fillStyle='rgba(0,204,255,.75)'; ctx.fillRect(x,p.t+ch-Math.round(sw/100*ch),hw,Math.round(sw/100*ch));
    ctx.fillStyle='rgba(170,128,255,.75)'; ctx.fillRect(x+hw+1,p.t+ch-Math.round(gw_/100*ch),hw,Math.round(gw_/100*ch));
    ctx.fillStyle='rgba(104,136,160,.7)'; ctx.font='8px JetBrains Mono'; ctx.textAlign='center';
    ctx.fillText(k+':00',x+gw/2,H-5);
  });
}

function drawDist() {
  var c = canvasSetup('cv3'); if (!c) return;
  var ctx=c.ctx,W=c.W,H=c.H,p=c.p;
  var cw=W-p.l-p.r, ch=H-p.t-p.b;
  var all30=[].concat.apply([],ALL.map(function(r){return r.t30;}));
  var rets=all30.map(function(t){return t.sRet;});
  if(!rets.length) return;
  var buckets=[];
  for(var v=-100;v<=300;v+=25) buckets.push({lo:v,hi:v+25,n:0});
  rets.forEach(function(r) {
    var b=buckets.find(function(b){return r>=b.lo&&r<b.hi;});
    if(b) b.n++;
  });
  var maxN=Math.max.apply(null,buckets.map(function(b){return b.n;}));
  drawGrid(ctx,p,cw,ch,W,H,4,maxN);
  var bw=Math.max(1,Math.floor(cw/buckets.length)-1);
  buckets.forEach(function(b,i) {
    if(!b.n) return;
    var x=p.l+i*(cw/buckets.length)+1;
    var bh=Math.max(1,Math.round((b.n/maxN)*ch));
    ctx.fillStyle=b.lo>=0?'rgba(0,204,255,.75)':'rgba(255,51,85,.65)';
    ctx.fillRect(x,p.t+ch-bh,bw,bh);
    if(i%3===0){ctx.fillStyle='rgba(104,136,160,.5)';ctx.font='7px JetBrains Mono';ctx.textAlign='center';ctx.fillText(b.lo+'%',x+bw/2,H-5);}
  });
}

function drawCum() {
  var c = canvasSetup('cv4'); if (!c) return;
  var ctx=c.ctx,W=c.W,H=c.H,p=c.p;
  var cw=W-p.l-p.r, ch=H-p.t-p.b;
  var all30=[].concat.apply([],ALL.map(function(r){return r.t30;})).sort(function(a,b){return a.entryDt-b.entryDt;});
  if(all30.length<2) return;
  var cumS=0,cumG=0,spts=[],gpts=[];
  all30.forEach(function(t){cumS+=t.sPnL;cumG+=t.gPnL;spts.push(cumS);gpts.push(cumG);});
  var all=spts.concat(gpts);
  var minV=Math.min.apply(null,all),maxV=Math.max.apply(null,all);
  var range=maxV-minV||1;
  var toY=function(v){return p.t+ch*(1-(v-minV)/range);};
  var xs=cw/(all30.length-1);
  drawGrid(ctx,p,cw,ch,W,H,4,null);
  if(minV<0&&maxV>0){
    var yz=toY(0); ctx.strokeStyle='rgba(255,204,0,.2)'; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(p.l,yz); ctx.lineTo(p.l+cw,yz); ctx.stroke(); ctx.setLineDash([]);
  }
  [[spts,'rgba(0,204,255,.85)'],[gpts,'rgba(170,128,255,.85)']].forEach(function(pair) {
    var pts=pair[0],col=pair[1];
    ctx.beginPath(); ctx.moveTo(p.l,toY(pts[0]));
    pts.forEach(function(v,i){ctx.lineTo(p.l+i*xs,toY(v));});
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
  });
  ctx.font='9px JetBrains Mono'; ctx.textAlign='left';
  ctx.fillStyle='rgba(0,204,255,.9)'; ctx.fillText('STRADDLE: '+pnlStr(spts[spts.length-1]),p.l+4,p.t+12);
  ctx.fillStyle='rgba(170,128,255,.9)'; ctx.fillText('STRANGLE: '+pnlStr(gpts[gpts.length-1]),p.l+4,p.t+24);
}

function drawGrid(ctx,p,cw,ch,W,H,divs,maxV) {
  ctx.strokeStyle='rgba(21,32,48,.6)'; ctx.lineWidth=1;
  for(var i=0;i<=divs;i++){
    var y=p.t+ch*(1-i/divs);
    ctx.beginPath(); ctx.moveTo(p.l,y); ctx.lineTo(p.l+cw,y); ctx.stroke();
    if(maxV!=null){
      ctx.fillStyle='rgba(104,136,160,.5)'; ctx.font='7px JetBrains Mono'; ctx.textAlign='right';
      ctx.fillText(Math.round(maxV*i/divs),p.l-3,y+3);
    }
  }
}

function switchTab(btn, name) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('panel-'+name).classList.add('on');
  if (name === 'charts' && ALL.length) setTimeout(renderCharts, 50);
}

function clearAll() {
  ALL = [];
  ['ov','ts','sym','tr','ch'].forEach(function(id) {
    document.getElementById(id).innerHTML = '';
  });
  document.getElementById('logbox').innerHTML = '';
  ['st-s','st-sp','st-tr'].forEach(function(id){document.getElementById(id).textContent='0';});
  ['st-sw3','st-sw4','st-gw3','st-gw4'].forEach(function(id){document.getElementById(id).textContent='—';});
}
