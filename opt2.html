<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Options AI Scanner PRO</title>

<style>
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: Arial;
  padding: 20px;
}

h1 { color: #38bdf8; }

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 10px;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.01);
}

.top { border-left: 5px solid #22c55e; }
.mid { border-left: 5px solid #eab308; }
.low { border-left: 5px solid #ef4444; }

.bar {
  height: 10px;
  border-radius: 6px;
  margin-top: 5px;
}

.green { background: #22c55e; }
.red { background: #ef4444; }

input {
  padding: 8px;
  margin-bottom: 10px;
  width: 200px;
}
</style>
</head>

<body>

<h1>🚀 Options AI Scanner PRO</h1>

<input id="filter" placeholder="Filter ticker...">

<div id="stats"></div>
<div id="results"></div>

<script>
let globalData = [];

function render(data) {

  let html = "";
  let topCount = 0;

  data.slice(0,50).forEach(d => {

    let level = "low";
    if (d.score > 8) { level = "top"; topCount++; }
    else if (d.score > 5) level = "mid";

    html += `
    <div class="card ${level}">
      <b>${d.ticker} ${d.type}</b><br>
      Strike: ${d.strike} | Exp: ${d.expiration}<br>
      Price: ${d.price}<br>
      Expected Move: ${d.expected_move}<br>
      Projected: ${d.projected_price}<br>
      Probability: ${(d.probability*100).toFixed(1)}%<br>
      Score: ${d.score}<br>
      Time: ${d.dte}d

      <div class="bar green" style="width:${d.probability*100}%"></div>
    </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
  document.getElementById("stats").innerHTML =
    `Top Signals: ${topCount}`;
}

async function load() {
  const res = await fetch("signals.json?" + Date.now());
  const data = await res.json();

  globalData = data.sort((a,b)=>b.score-a.score);

  render(globalData);
}

document.getElementById("filter").addEventListener("input", e => {
  const val = e.target.value.toUpperCase();
  const filtered = globalData.filter(d => d.ticker.includes(val));
  render(filtered);
});

load();
setInterval(load, 120000);
</script>

</body>
</html>
