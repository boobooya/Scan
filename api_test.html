<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #00ff00;
        }
        .test { margin: 20px 0; padding: 15px; background: #2d2d2d; border-radius: 5px; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .info { color: #ffff00; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        pre { background: #000; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔬 API Connectivity Test</h1>
    <button onclick="runAllTests()">▶️ Run All Tests</button>
    
    <div id="results"></div>

    <script>
        async function runAllTests() {
            const results = document.getElementById('results');
            results.innerHTML = '<p class="info">Running tests...</p>';
            
            // Test 1: Direct Yahoo Finance (will fail on most browsers due to CORS)
            await testDirect();
            
            // Test 2: AllOrigins Proxy
            await testAllOrigins();
            
            // Test 3: CorsProxy
            await testCorsProxy();
            
            // Test 4: CodeTabs Proxy
            await testCodeTabs();
            
            // Test 5: Fetch actual options data
            await testOptionsChain();
        }

        async function testDirect() {
            addResult('Test 1: Direct Yahoo Finance API');
            try {
                const response = await fetch('https://query2.finance.yahoo.com/v7/finance/options/SPY', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    addResult('✅ Direct access WORKS!', 'success');
                    addResult('Sample data: ' + JSON.stringify(data).substring(0, 100), 'info');
                } else {
                    addResult('❌ Direct access failed: HTTP ' + response.status, 'error');
                }
            } catch (e) {
                addResult('❌ Direct access blocked: ' + e.message, 'error');
            }
        }

        async function testAllOrigins() {
            addResult('Test 2: AllOrigins Proxy');
            try {
                const url = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://query2.finance.yahoo.com/v7/finance/options/SPY');
                const response = await fetch(url);
                
                if (response.ok) {
                    const data = await response.json();
                    addResult('✅ AllOrigins proxy WORKS!', 'success');
                    addResult('Sample data: ' + JSON.stringify(data).substring(0, 100), 'info');
                    return true;
                } else {
                    addResult('❌ AllOrigins failed: HTTP ' + response.status, 'error');
                }
            } catch (e) {
                addResult('❌ AllOrigins error: ' + e.message, 'error');
            }
            return false;
        }

        async function testCorsProxy() {
            addResult('Test 3: CorsProxy.io');
            try {
                const url = 'https://corsproxy.io/?' + encodeURIComponent('https://query2.finance.yahoo.com/v7/finance/options/SPY');
                const response = await fetch(url);
                
                if (response.ok) {
                    const data = await response.json();
                    addResult('✅ CorsProxy WORKS!', 'success');
                    return true;
                } else {
                    addResult('❌ CorsProxy failed: HTTP ' + response.status, 'error');
                }
            } catch (e) {
                addResult('❌ CorsProxy error: ' + e.message, 'error');
            }
            return false;
        }

        async function testCodeTabs() {
            addResult('Test 4: CodeTabs Proxy');
            try {
                const url = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent('https://query2.finance.yahoo.com/v7/finance/options/SPY');
                const response = await fetch(url);
                
                if (response.ok) {
                    const data = await response.json();
                    addResult('✅ CodeTabs WORKS!', 'success');
                    return true;
                } else {
                    addResult('❌ CodeTabs failed: HTTP ' + response.status, 'error');
                }
            } catch (e) {
                addResult('❌ CodeTabs error: ' + e.message, 'error');
            }
            return false;
        }

        async function testOptionsChain() {
            addResult('Test 5: Fetch Real Options Data for SPY');
            try {
                const url = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://query2.finance.yahoo.com/v7/finance/options/SPY');
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.optionChain && data.optionChain.result && data.optionChain.result[0]) {
                    const result = data.optionChain.result[0];
                    const expirations = result.expirationDates || [];
                    const quote = result.quote;
                    
                    addResult('✅ OPTIONS DATA RETRIEVED!', 'success');
                    addResult('Current Price: $' + quote.regularMarketPrice, 'info');
                    addResult('Number of expirations: ' + expirations.length, 'info');
                    
                    if (expirations.length > 0) {
                        const firstExp = new Date(expirations[0] * 1000);
                        const daysToExp = Math.round((firstExp - new Date()) / (1000 * 60 * 60 * 24));
                        addResult('Next expiration: ' + firstExp.toLocaleDateString() + ' (' + daysToExp + ' days)', 'info');
                        addResult('Is Weekly (0-7 days): ' + (daysToExp <= 7 ? 'YES ✅' : 'NO ❌'), daysToExp <= 7 ? 'success' : 'error');
                    }
                    
                    addResult('<pre>' + JSON.stringify(result, null, 2).substring(0, 500) + '...</pre>', 'info');
                } else {
                    addResult('❌ No option chain data in response', 'error');
                }
            } catch (e) {
                addResult('❌ Options test error: ' + e.message, 'error');
            }
        }

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = 'test ' + type;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(runAllTests, 500);
        });
    </script>
</body>
</html>
